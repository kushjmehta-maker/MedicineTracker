[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "medicine-tracker-api"

[services.variables]
PORT = "3000"
HOST = "0.0.0.0"
NODE_ENV = "production"
